name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    name: Test + Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
      - uses: gradle/actions/setup-gradle@v4

      - name: Compile
        run: ./gradlew compileJava compileTestJava

      - name: Run tests + coverage
        run: ./gradlew test jacocoTestReport jacocoTestCoverageVerification

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/reports/tests/
          retention-days: 14

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/reports/jacoco/
          retention-days: 14

      - name: Coverage summary
        if: always()
        run: |
          awk -F',' '
            NR > 1 {
              instructions += $4 + $5
              covered     += $5
              branches    += $6 + $7
              bcovered    += $7
              lines       += $8 + $9
              lcovered    += $9
            }
            END {
              printf "## Coverage Summary\n\n"
              printf "| Metric       | Covered | Total   | Percentage |\n"
              printf "|--------------|---------|---------|------------|\n"
              if (lines > 0)
                printf "| Lines        | %d  | %d | %.2f%%     |\n", lcovered, lines, 100*lcovered/lines
              if (branches > 0)
                printf "| Branches     | %d  | %d | %.2f%%     |\n", bcovered, branches, 100*bcovered/branches
              if (instructions > 0)
                printf "| Instructions | %d  | %d | %.2f%%     |\n", covered, instructions, 100*covered/instructions
            }
          ' build/reports/jacoco/test/jacocoTestReport.csv >> "$GITHUB_STEP_SUMMARY"

  checkstyle:
    name: Checkstyle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
      - uses: gradle/actions/setup-gradle@v4

      - run: ./gradlew checkstyleMain

      - name: Upload Checkstyle report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-report
          path: build/reports/checkstyle/
          retention-days: 14

  javac:
    name: javac (no Gradle)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Compile main sources with javac
        run: |
          mkdir -p out-javac
          find src -name '*.java' \
            ! -name '*Test.java' \
            ! -name '*TestHelpers.java' \
            ! -name 'OilExample.java' > sources.txt
          javac -encoding UTF-8 -Xlint:none \
            -d out-javac -cp "lib/*" @sources.txt

  spotbugs:
    name: SpotBugs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
      - uses: gradle/actions/setup-gradle@v4

      - run: ./gradlew spotbugsMain

      - name: Upload SpotBugs report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-report
          path: build/reports/spotbugs/
          retention-days: 14

  spotless:
    name: Spotless (format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
      - uses: gradle/actions/setup-gradle@v4

      - run: ./gradlew spotlessCheck

  docs:
    name: Docs (AqlHelp)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
      - uses: gradle/actions/setup-gradle@v4

      - name: Generate CQL manual
        run: ./gradlew generateHelp

      - name: Verify docs generated properly
        run: |
          set -euo pipefail
          test -d help || { echo "::error::help/ was not produced"; exit 1; }
          for f in index.html syntax.html options.html examples.html logo.html; do
            test -s "help/$f" || { echo "::error::missing or empty help/$f"; exit 1; }
          done

      - name: Upload generated docs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cql-manual
          path: help/
          retention-days: 14
