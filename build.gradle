plugins {
    id 'java'
    id 'checkstyle'
    id 'jacoco'
    id 'com.github.spotbugs' version '6.1.2'
    id 'com.diffplug.spotless' version '7.0.2'
}

group = 'org.categoricaldata'
version = '1.0.0'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
    // Keep producing Java 17 bytecode for runtime compatibility.
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

repositories {
    mavenCentral()
}

sourceSets {
    main {
        java {
            srcDirs = ['src']
            exclude '**/*Test.java'
            exclude '**/*TestHelpers.java'
            // OilExample.java has a text block exceeding JVM's 65535-byte constant pool limit.
            // It compiles under Eclipse's ecj but not javac. Exclude until the string is split.
            exclude '**/OilExample.java'
        }
        resources {
            srcDirs = ['resources/open']
        }
    }
    test {
        java {
            srcDirs = ['src']
            include '**/*Test.java'
            include '**/*TestHelpers.java'
        }
    }
}

dependencies {
    // All existing JARs from lib/
    implementation fileTree(dir: 'lib', include: ['*.jar'])

    // Test dependencies
    testImplementation 'org.junit.jupiter:junit-jupiter:5.11.4'
    testImplementation 'org.mockito:mockito-core:5.14.2'
    testImplementation 'org.mockito:mockito-junit-jupiter:5.14.2'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    options.compilerArgs += ['-Xlint:none']
}

// --- Testing ---
test {
    useJUnitPlatform()
    jvmArgs += ['--add-opens', 'java.base/java.lang=ALL-UNNAMED']

    testLogging {
        events 'passed', 'skipped', 'failed'
        showStandardStreams = false
    }

    // Timeout for the full test suite (CQL examples can be slow)
    timeout = java.time.Duration.ofMinutes(15)
}

// --- JaCoCo (Coverage) ---
jacoco {
    toolVersion = '0.8.12'
}

jacocoTestReport {
    dependsOn test
    reports {
        xml.required = true
        html.required = true
        csv.required = true
    }
}

jacocoTestCoverageVerification {
    dependsOn jacocoTestReport
    violationRules {
        rule {
            limit {
                counter = 'LINE'
                value = 'COVEREDRATIO'
                minimum = 0.27
            }
        }
    }
}

// --- Spotless (formatting) ---
spotless {
    // Only check files that changed vs a baseline — won't flag the existing unformatted
    // codebase. Locally, ratchet against HEAD (your uncommitted changes). In CI, a clean
    // checkout has no diff vs HEAD, so ratchet against the base branch to check what the
    // PR actually changed. GitHub Actions sets CI=true.
    ratchetFrom(System.getenv('CI') ? 'origin/master' : 'HEAD')
    java {
        target 'src/**/*.java'
        targetExclude '**/*Test.java', '**/*TestHelpers.java', '**/easik/**', '**/com/**', '**/OilExample.java'
        googleJavaFormat('1.28.0')
        removeUnusedImports()
        trimTrailingWhitespace()
        endWithNewline()
    }
}

// --- Documentation generation ---
// Runs AqlHelp.main, which generates the CQL HTML manual into the help/ directory
// (relative to the project root). The forked JVM calls System.exit(0) on success.
tasks.register('generateHelp', JavaExec) {
    group = 'documentation'
    description = 'Generates the CQL HTML manual into the help/ directory.'
    dependsOn 'classes'
    mainClass = 'catdata.cql.exp.AqlHelp'
    classpath = sourceSets.main.runtimeClasspath
    // Examples may touch AWT; force headless so it runs on CI with no display.
    systemProperty 'java.awt.headless', 'true'
    jvmArgs '--add-opens', 'java.base/java.lang=ALL-UNNAMED'
}

// Git pre-commit hook: runs spotlessCheck before each commit
tasks.register('installGitHook', Copy) {
    from 'config/hooks/pre-commit'
    into '.git/hooks'
    filePermissions {
        unix('rwxr-xr-x')
    }
}

tasks.named('compileJava') {
    dependsOn 'installGitHook'
}

// --- Checkstyle ---
checkstyle {
    toolVersion = '10.21.1'
    configFile = file('config/checkstyle/checkstyle.xml')
    // Don't fail the build initially — just report
    ignoreFailures = true
    // Only check main sources, not tests
    sourceSets = [project.sourceSets.main]
}

tasks.withType(Checkstyle).configureEach {
    maxHeapSize = '1g'
}

// --- SpotBugs ---
spotbugs {
    ignoreFailures = true
    effort = com.github.spotbugs.snom.Effort.valueOf('MIN')
    reportLevel = com.github.spotbugs.snom.Confidence.valueOf('HIGH')
    excludeFilter = file('config/spotbugs/exclude.xml')
}

tasks.withType(com.github.spotbugs.snom.SpotBugsTask).configureEach {
    reports {
        html.required = true
        xml.required = true
    }
}
